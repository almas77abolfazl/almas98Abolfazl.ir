<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
  <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-8">
    {{ i18n.t('skillsTitle') }}
  </h1>

  @if (isLoading) {
    <p class="text-gray-500 dark:text-gray-500">{{ i18n.isFa ? 'در حال بارگذاری...' : 'Loading...' }}</p>
  } @else {
    <div class="grid md:grid-cols-2 gap-8">
      @for (group of groupedSkills | keyvalue; track group.key) {
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6">
          <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">{{ group.key }}</h3>
          <div class="space-y-4">
            @for (skill of group.value; track skill.id) {
              <div>
                <div class="flex justify-between mb-1">
                  <span class="text-gray-700 dark:text-gray-300">{{ skill.name }}</span>
                  <span class="text-sm text-gray-500 dark:text-gray-400">{{ skill.proficiency ?? 0 }}%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
                  <div
                    class="bg-secondary h-2.5 rounded-full"
                    [style.width.%]="getProficiencyWidth(skill.proficiency)"
                  ></div>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  }
</section>
