<header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur border-b border-gray-200 dark:border-gray-700">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a routerLink="/" class="text-xl font-bold text-gray-900 dark:text-white">
        {{ i18n.isFa ? 'عابط' : 'almas98' }}
      </a>

      <nav class="hidden md:flex space-x-8">
        <a routerLink="/" routerLinkActive="text-secondary" class="text-gray-700 dark:text-gray-300 hover:text-secondary dark:hover:text-secondary">
          {{ i18n.t('home') }}
        </a>
        <a routerLink="/about-me" routerLinkActive="text-secondary" class="text-gray-700 dark:text-gray-300 hover:text-secondary dark:hover:text-secondary">
          {{ i18n.t('about') }}
        </a>
        <a routerLink="/experiences" routerLinkActive="text-secondary" class="text-gray-700 dark:text-gray-300 hover:text-secondary dark:hover:text-secondary">
          {{ i18n.t('experiences') }}
        </a>
        <a routerLink="/skills" routerLinkActive="text-secondary" class="text-gray-700 dark:text-gray-300 hover:text-secondary dark:hover:text-secondary">
          {{ i18n.t('skills') }}
        </a>
      </nav>

      <div class="flex items-center space-x-4">
        <button
          (click)="theme.toggle()"
          class="p-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800"
          [title]="i18n.t('toggleTheme')"
        >
          @if (!theme.isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-2.707 6.293a1 1 0 010-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
            </svg>
          }
        </button>

        <button
          (click)="i18n.toggleLang()"
          class="px-3 py-1 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          {{ i18n.currentLang() === 'en' ? 'FA' : 'EN' }}
        </button>
      </div>
    </div>
  </div>
</header>
