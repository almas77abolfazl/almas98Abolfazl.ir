<div>
  <label class="admin-field-label">{{ label }}</label>

  @if (url) {
    <div class="flex items-center gap-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-3">
      @if (isImage) {
        <img [src]="url" alt="" class="h-12 w-12 rounded-lg object-cover" />
      } @else {
        <span class="flex h-12 w-12 items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-300">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
        </span>
      }
      <div class="min-w-0 flex-1">
        <a [href]="url" target="_blank" rel="noopener" class="block truncate text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:underline">{{ fileName }}</a>
        <p class="text-xs text-slate-400">{{ i18n.t('uploadedFile') }}</p>
      </div>
      <button type="button" (click)="remove()" class="text-rose-600 hover:underline dark:text-rose-400 text-xs">{{ i18n.t('remove') }}</button>
    </div>
  } @else {
    <button type="button" (click)="openPicker()"
      [class.dragging]="dragging()"
      (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
      class="flex w-full flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 px-4 py-6 text-center transition-colors hover:border-indigo-400">
      @if (uploading()) {
        <span class="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></span>
      } @else {
        <svg class="h-7 w-7 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
      }
      <span class="text-sm text-slate-500 dark:text-slate-400">{{ i18n.t('uploadHint') }}</span>
      @if (hint) { <span class="text-xs text-slate-400">{{ hint }}</span> }
    </button>
  }

  <input #fileInput type="file" class="hidden" [accept]="accept" (change)="onFileSelected($event)" />
</div>
