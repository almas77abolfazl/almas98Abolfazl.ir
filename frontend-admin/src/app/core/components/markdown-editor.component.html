<div class="overflow-hidden rounded-xl border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900">
  <div class="flex flex-wrap items-center gap-1 border-b border-slate-200 p-2 dark:border-slate-700">
    <button type="button" (click)="bold()" class="rounded p-1.5 text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Bold"><b>B</b></button>
    <button type="button" (click)="italic()" class="rounded p-1.5 text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Italic"><i>I</i></button>
    <span class="mx-1 h-5 w-px bg-slate-200 dark:bg-slate-700"></span>
    <button type="button" (click)="h2()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Heading 2">H2</button>
    <button type="button" (click)="h3()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Heading 3">H3</button>
    <span class="mx-1 h-5 w-px bg-slate-200 dark:bg-slate-700"></span>
    <button type="button" (click)="code()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Inline code">{{ '{' }} {{ '}' }}</button>
    <button type="button" (click)="codeblock()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Code block">Code</button>
    <button type="button" (click)="link()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Link">Link</button>
    <span class="mx-1 h-5 w-px bg-slate-200 dark:bg-slate-700"></span>
    <button type="button" (click)="ul()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Bulleted list">• List</button>
    <button type="button" (click)="ol()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Numbered list">1. List</button>
    <button type="button" (click)="quote()" class="rounded px-2 py-1 text-xs font-semibold text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700" title="Quote">" Quote</button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2">
    <textarea #ta
      [value]="value()"
      (input)="onInput($any($event.target).value)"
      [disabled]="disabled"
      [dir]="dir"
      [class.font-fa]="isFa"
      class="min-h-[300px] w-full resize-y bg-transparent p-3 font-mono text-sm text-slate-900 outline-none dark:text-white"></textarea>
    <div class="md-preview border-s-0 border-t border-slate-200 p-3 text-sm text-slate-700 dark:border-slate-700 dark:text-slate-300 lg:border-s-0 lg:border-t-0 lg:border-e"
      [innerHTML]="preview()"></div>
  </div>
</div>
