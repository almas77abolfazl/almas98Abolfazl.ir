<div class="relative flex min-h-screen items-center justify-center overflow-hidden bg-slate-100 px-4 py-10 dark:bg-slate-950">
  <!-- Decorative brand glow -->
  <div class="pointer-events-none absolute -top-32 -right-24 h-80 w-80 rounded-full bg-linear-to-br from-indigo-500/30 to-violet-400/20 blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-32 -left-24 h-80 w-80 rounded-full bg-linear-to-br from-violet-400/20 to-indigo-500/30 blur-3xl"></div>

  <!-- Top bar: back to site + language toggle -->
  <div class="absolute inset-x-0 top-0 flex items-center justify-between p-4 sm:p-6">
    <a [href]="siteUrl" class="inline-flex items-center gap-1.5 text-sm text-slate-500 transition-colors hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-100">
      @if (i18n.isFa) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M11 17l6-6-6-6M5 17l6-6-6-6"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M14 7l-6 6 6 6M19 7l-6 6 6 6"/></svg>
      }
      <span>{{ i18n.t('backToSite') }}</span>
    </a>
    <button type="button" (click)="toggleLang()" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors hover:bg-white dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-900">
      {{ i18n.isFa ? 'EN' : 'فا' }}
    </button>
  </div>

  <div class="relative w-full max-w-md admin-card">
    <div class="absolute inset-x-0 top-0 h-1.5 rounded-t-xl bg-linear-to-r from-indigo-500 to-violet-400"></div>

    <div class="mb-7 flex flex-col items-center text-center">
      <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-linear-to-br from-indigo-500 to-violet-400 text-2xl font-bold text-white shadow-lg shadow-indigo-500/30">A</div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100">{{ i18n.t('login_title') }}</h1>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ i18n.t('login_subtitle') }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
      <div>
        <label for="username" class="admin-field-label">{{ i18n.t('username') }}</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          autofocus
          class="admin-input"
        />
      </div>
      <div>
        <label for="password" class="admin-field-label">{{ i18n.t('password') }}</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="admin-input"
        />
      </div>
      @if (error) {
        <div class="rounded-lg bg-rose-50 px-3 py-2 text-sm text-rose-600 dark:bg-rose-500/10 dark:text-rose-300">{{ error }}</div>
      }
      <button
        type="submit"
        [disabled]="loading"
        class="admin-btn admin-btn-primary w-full disabled:opacity-60"
      >
        {{ loading ? i18n.t('signingIn') : i18n.t('signIn') }}
      </button>
    </form>
  </div>
</div>
