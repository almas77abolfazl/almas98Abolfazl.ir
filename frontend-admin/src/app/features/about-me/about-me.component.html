
    <div>
      <h1 class="admin-title mb-6">{{ i18n.t('nav_about') }}</h1>
      <form (ngSubmit)="onSubmit()" #f="ngForm" (input)="markDirty()" (change)="markDirty()" class="admin-card space-y-6">

        <!-- Full Name -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-en">EN</span> Full Name</label>
            <input [(ngModel)]="model.fullName" name="fullName" required class="admin-input" />
          </div>
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-fa">FA</span> نام کامل</label>
            <input [(ngModel)]="model.fullNameFa" name="fullNameFa" dir="rtl" class="admin-input font-fa" />
          </div>
        </div>

        <!-- Title -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-en">EN</span> Title</label>
            <input [(ngModel)]="model.title" name="title" required class="admin-input" />
          </div>
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-fa">FA</span> عنوان</label>
            <input [(ngModel)]="model.titleFa" name="titleFa" dir="rtl" class="admin-input font-fa" />
          </div>
        </div>

        <!-- Bio -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-en">EN</span> Bio</label>
            <textarea [(ngModel)]="model.bio" name="bio" rows="5" class="admin-input"></textarea>
          </div>
          <div>
            <label class="admin-field-label"><span class="admin-lang admin-lang-fa">FA</span> بیوگرافی</label>
            <textarea [(ngModel)]="model.bioFa" name="bioFa" rows="5" dir="rtl" class="admin-input font-fa"></textarea>
          </div>
        </div>

        <!-- URLs -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <app-image-upload
              [url]="model.avatarUrl"
              (urlChange)="model.avatarUrl = $event; markDirty()"
              [label]="i18n.t('about_avatarUrl')"
              shape="avatar"></app-image-upload>
          </div>
          <div>
            <app-file-upload
              [url]="model.resumeUrl"
              [originalName]="model.resumeName"
              (urlChange)="model.resumeUrl = $event; markDirty()"
              (nameChange)="model.resumeName = $event; markDirty()"
              [label]="i18n.t('about_resumeUrl')"
              [hint]="i18n.t('about_resumeHint')"></app-file-upload>
          </div>
        </div>

        <!-- Contact & Social -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="admin-field-label">{{ i18n.t('about_email') }}</label>
            <input [(ngModel)]="model.email" name="email" type="email" class="admin-input" [placeholder]="i18n.t('about_email')" />
          </div>
          <div>
            <label class="admin-field-label">{{ i18n.t('about_phone') }}</label>
            <input [(ngModel)]="model.phone" name="phone" dir="ltr" class="admin-input" [placeholder]="i18n.t('about_phone')" />
          </div>
          <div class="sm:col-span-2">
            <label class="admin-field-label">{{ i18n.t('about_location') }}</label>
            <input [(ngModel)]="model.location" name="location" class="admin-input" [placeholder]="i18n.t('about_location')" />
          </div>
          <div>
            <label class="admin-field-label">{{ i18n.t('about_linkedin') }}</label>
            <input [(ngModel)]="model.linkedinUrl" name="linkedinUrl" dir="ltr" class="admin-input" [placeholder]="'linkedin.com/in/...'" />
          </div>
          <div>
            <label class="admin-field-label">{{ i18n.t('about_github') }}</label>
            <input [(ngModel)]="model.githubUrl" name="githubUrl" dir="ltr" class="admin-input" [placeholder]="'github.com/...'" />
          </div>
          <div>
            <label class="admin-field-label">{{ i18n.t('about_youtube') }}</label>
            <input [(ngModel)]="model.youtubeUrl" name="youtubeUrl" dir="ltr" class="admin-input" [placeholder]="'youtube.com/...'" />
          </div>
          <div>
            <label class="admin-field-label">{{ i18n.t('about_twitter') }}</label>
            <input [(ngModel)]="model.twitterUrl" name="twitterUrl" dir="ltr" class="admin-input" [placeholder]="'x.com/...'" />
          </div>
          <div class="sm:col-span-2">
            <label class="admin-field-label">{{ i18n.t('about_instagram') }}</label>
            <input [(ngModel)]="model.instagramUrl" name="instagramUrl" dir="ltr" class="admin-input" [placeholder]="'instagram.com/...'" />
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button type="submit" class="admin-btn admin-btn-primary">{{ i18n.t('save') }}</button>
        </div>
      </form>
    </div>
